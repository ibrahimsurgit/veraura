<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VERAURA PANEL</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#dfe2e8;
}

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:190px;
    height:100vh;
    background:#03133b;
    padding:20px;
}

.logo{
    color:#ff00b7;
    font-size:28px;
    font-weight:bold;
    margin-bottom:40px;
}

.menu button{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    background:transparent;
    color:white;
    text-align:left;
    cursor:pointer;
    font-size:18px;
}

.menu button:hover{
    background:#1c2e63;
}

.main{
    margin-left:190px;
    padding:20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}

h1{
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:#f2f2f2;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-bottom:1px solid #eee;
}

.btn{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

.edit{
    background:#2563eb;
}

.delete{
    background:#dc2626;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    margin-bottom:10px;
}

.addbtn{
    background:#ff00b7;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.topcards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.stat{
    background:white;
    padding:20px;
    border-radius:18px;
}

.stat h2{
    margin-top:10px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="sidebar">

    <div class="logo">VERAURA</div>

    <div class="menu">
        <button onclick="dashboardAc()">Dashboard</button>
        <button onclick="urunlerAc()">Ürünler</button>
        <button onclick="satislarAc()">Satışlar</button>
        <button onclick="pazaryeriAc()">Pazaryerleri</button>
        <button onclick="stokAc()">Stok</button>
    </div>

</div>

<div class="main">

    <div id="dashboardPage">

        <div class="topcards">

            <div class="stat">
                Toplam Sipariş
                <h2 id="toplamSiparis">0</h2>
            </div>

            <div class="stat">
                Toplam Adet
                <h2 id="toplamAdet">0</h2>
            </div>

            <div class="stat">
                Toplam Kazanç
                <h2 id="toplamKazanc">0 ₺</h2>
            </div>

            <div class="stat">
                Pazaryeri
                <h2 id="toplamPazaryeri">0</h2>
            </div>

        </div>

    </div>

    <div id="urunlerPage" class="hidden">

        <div class="card">

            <h1>Ürün Ekle</h1>

            <input type="text" id="urun_kodu" placeholder="Ürün Kodu">
            <input type="text" id="urun_adi" placeholder="Ürün Adı">
            <input type="number" id="alis_fiyati" placeholder="Alış">
            <input type="number" id="satis_fiyati" placeholder="Satış">

            <button class="addbtn" onclick="urunEkle()">
                Ürün Ekle
            </button>

        </div>

        <div class="card">

            <h1>Ürünler</h1>

            <table id="urunTable">

                <thead>
                    <tr>
                        <th>Kod</th>
                        <th>Ürün</th>
                        <th>Alış</th>
                        <th>Satış</th>
                        <th>İşlem</th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

    <div id="stokPage" class="hidden">

        <div class="card">

            <h1>Stok Takip</h1>

            <table id="stokTable">

                <thead>
                    <tr>
                        <th>Kod</th>
                        <th>Ürün</th>
                        <th>Stok</th>
                        <th>Alış</th>
                        <th>Satış</th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

</div>

<script>

const API = "https://veraura-api.onrender.com";

function gizle(){

    document.getElementById("dashboardPage").classList.add("hidden");
    document.getElementById("urunlerPage").classList.add("hidden");
    document.getElementById("stokPage").classList.add("hidden");

}

function dashboardAc(){

    gizle();

    document.getElementById("dashboardPage")
    .classList.remove("hidden");

    dashboardGetir();

}

function urunlerAc(){

    gizle();

    document.getElementById("urunlerPage")
    .classList.remove("hidden");

    urunleriGetir();

}

function stokAc(){

    gizle();

    document.getElementById("stokPage")
    .classList.remove("hidden");

    stokGetir();

}

async function dashboardGetir(){

    const r = await fetch(API + "/dashboard");

    const j = await r.json();

    if(j.success){

        document.getElementById("toplamSiparis")
        .innerText = j.data.toplam_siparis;

        document.getElementById("toplamAdet")
        .innerText = j.data.toplam_adet;

        document.getElementById("toplamKazanc")
        .innerText = Number(j.data.toplam_kazanc)
        .toLocaleString("tr-TR") + " ₺";

        document.getElementById("toplamPazaryeri")
        .innerText = j.data.toplam_pazaryeri;

    }

}

async function urunleriGetir(){

    const r = await fetch(API + "/urunler");

    const j = await r.json();

    const tbody =
    document.querySelector("#urunTable tbody");

    tbody.innerHTML = "";

    j.data.forEach(x=>{

        tbody.innerHTML += `
        <tr>
            <td>${x.urun_kodu}</td>
            <td>${x.urun_adi}</td>
            <td>${x.alis_fiyati}</td>
            <td>${x.satis_fiyati}</td>
            <td>

                <button class="btn delete"
                onclick="urunSil(${x.id})">
                Sil
                </button>

            </td>
        </tr>
        `;

    });

}

async function stokGetir(){

    const r = await fetch(API + "/stok");

    const j = await r.json();

    console.log(j);

    const tbody =
    document.querySelector("#stokTable tbody");

    tbody.innerHTML = "";

    if(!j.success){
        alert("Stok verisi yok");
        return;
    }

    j.data.forEach(x=>{

        tbody.innerHTML += `
        <tr>
            <td>${x.urun_kodu}</td>
            <td>${x.urun_adi}</td>
            <td>${x.stok}</td>
            <td>${x.alis_fiyati}</td>
            <td>${x.satis_fiyati}</td>
        </tr>
        `;

    });

}

async function urunEkle(){

    await fetch(API + "/urun-ekle",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            urun_kodu:
            document.getElementById("urun_kodu").value,

            urun_adi:
            document.getElementById("urun_adi").value,

            alis_fiyati:
            document.getElementById("alis_fiyati").value,

            satis_fiyati:
            document.getElementById("satis_fiyati").value

        })

    });

    urunleriGetir();

}

async function urunSil(id){

    if(!confirm("Silinsin mi?"))
    return;

    await fetch(API + "/urun-sil/" + id,{
        method:"DELETE"
    });

    urunleriGetir();
    stokGetir();

}

dashboardAc();

</script>

</body>
</html>
