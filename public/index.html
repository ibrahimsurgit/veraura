<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VERAURA PANEL</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6fb;
    color:#111827;
}

.layout{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:250px;
    background:#0f172a;
    color:white;
    padding:22px;
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#ff00b8;
    margin-bottom:35px;
}

.menu button{
    width:100%;
    background:transparent;
    color:#cbd5e1;
    border:none;
    padding:13px;
    text-align:left;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:8px;
    font-size:15px;
}

.menu button:hover,
.menu button.active{
    background:#1e293b;
    color:white;
}

.main{
    flex:1;
    padding:28px;
}

.topbar{
    background:white;
    padding:18px 22px;
    border-radius:16px;
    margin-bottom:24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 16px rgba(0,0,0,0.06);
}

.card{
    background:white;
    border-radius:16px;
    padding:22px;
    box-shadow:0 4px 16px rgba(0,0,0,0.06);
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
}

.stat-title{
    color:#64748b;
    font-size:14px;
}

.stat-value{
    font-size:26px;
    font-weight:bold;
    margin-top:8px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:13px;
    border-bottom:1px solid #e5e7eb;
    text-align:left;
}

th{
    background:#f8fafc;
    color:#475569;
}

.kazanc{
    color:#16a34a;
    font-weight:bold;
}

.logout{
    background:#0f172a;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <div class="logo">VERAURA</div>

        <div class="menu">
            <button class="active">Dashboard</button>
            <button>Ürünler</button>
            <button>Satışlar</button>
            <button>Pazaryerleri</button>
            <button>Stok</button>
            <button>Raporlar</button>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <strong>Dashboard</strong><br>
                <small>Satış ve stok takip özeti</small>
            </div>

            <button class="logout">Çıkış</button>
        </div>

        <div class="grid">
            <div class="card">
                <div class="stat-title">Toplam Sipariş</div>
                <div class="stat-value" id="toplamSiparis">0</div>
            </div>

            <div class="card">
                <div class="stat-title">Toplam Adet</div>
                <div class="stat-value" id="toplamAdet">0</div>
            </div>

            <div class="card">
                <div class="stat-title">Toplam Kazanç</div>
                <div class="stat-value" id="toplamKazanc">0 ₺</div>
            </div>

            <div class="card">
                <div class="stat-title">Pazaryeri</div>
                <div class="stat-value" id="pazaryeriSayisi">0</div>
            </div>
        </div>

        <div class="card">
            <h2>Pazaryeri Özeti</h2>

            <table id="dashboardTable">
                <thead>
                    <tr>
                        <th>Pazaryeri</th>
                        <th>Sipariş</th>
                        <th>Adet</th>
                        <th>Toplam Kazanç</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>
        </div>
    </main>

</div>

<script>
async function dashboardGetir(){
    const response = await fetch("/dashboard");
    const result = await response.json();

    const tbody = document.querySelector("#dashboardTable tbody");
    tbody.innerHTML = "";

    let toplamSiparis = 0;
    let toplamAdet = 0;
    let toplamKazanc = 0;

    result.data.forEach(item => {
        toplamSiparis += Number(item.siparis_sayisi);
        toplamAdet += Number(item.toplam_adet);
        toplamKazanc += Number(item.toplam_kazanc);

        tbody.innerHTML += `
            <tr>
                <td>${item.pazaryeri}</td>
                <td>${item.siparis_sayisi}</td>
                <td>${item.toplam_adet}</td>
                <td class="kazanc">${Number(item.toplam_kazanc).toLocaleString("tr-TR")} ₺</td>
            </tr>
        `;
    });

    document.getElementById("toplamSiparis").innerText = toplamSiparis;
    document.getElementById("toplamAdet").innerText = toplamAdet;
    document.getElementById("toplamKazanc").innerText = toplamKazanc.toLocaleString("tr-TR") + " ₺";
    document.getElementById("pazaryeriSayisi").innerText = result.data.length;
}

dashboardGetir();
</script>

</body>
</html>
